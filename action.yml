name: setup-hacklang
description: 'Install HHVM and set up the Hack programming language environment'
author: sushil
inputs:
  hack-version:
    description: 'The version of HHVM/Hack to install'
    required: true
    default: latest
  debug:
    description: 'Test your Code Coverage' 
    required: false
    default: false
    
branding:
  icon: 'code'
  color: purple

runs:
  using: composite
  steps:
    - shell: bash
      run: ${{ github.action_path }}/scripts/composer.sh

    - shell: bash
      run: |
        apt-get update && apt-get upgrade -y 
        apt-get install software-properties-common apt-transport-https 
        apt-key adv --recv-keys --keyserver hkp://keyserver.ubuntu.com:443 0xB4112585D386EB94 
        add-apt-repository https://dl.hhvm.com/ubuntu 
        apt-get update && apt-get upgrade -y
        apt-get install hhvm hhvm-nightly hhvm-dev -y

name: setup-hacklang
description: Install HHVM and set up the Hack programming language environment
author: 'sushil kumar'
inputs:
  hhvm-version:
    description: The version of HHVM/Hack to install
    required: true
    default: latest

branding:
  icon: 'code'
  color: purple

runs:
  using: composite
  steps:
    - shell: bash
      run: ${{ github.action_path }}/scripts/composer.sh

    - name: Install HHVM & Hack
      shell: bash
      run: |
        set -e

        sudo apt-get update
        sudo apt-get install -y software-properties-common apt-transport-https curl gnupg

        sudo mkdir -p /usr/share/keyrings

        curl -fsSL https://dl.hhvm.com/conf/hhvm.gpg.key \
          | sudo gpg --dearmor -o /usr/share/keyrings/hhvm-archive-keyring.gpg

        # 🔥 Force focal instead of jammy
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/hhvm-archive-keyring.gpg] https://dl.hhvm.com/ubuntu focal main" \
          | sudo tee /etc/apt/sources.list.d/hhvm.list > /dev/null

        sudo apt-get update

        # ⚠️ Install with fallback fix
        sudo apt-get install -y hhvm || true

        # Fix broken deps (libssl1.1 etc.)
        sudo apt-get install -f -y

        hhvm --version

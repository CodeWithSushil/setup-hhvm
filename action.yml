name: setup-hacklang
description: 'Install HHVM and set up the Hack programming language environment'
author: sushil
inputs:
  hack-version:
    description: 'The version of HHVM/Hack to install'
    required: true
    default: latest
  debug:
    description: 'Test your Code Coverage' 
    required: false
    default: latest
    
branding:
  icon: 'code'
  color: purple

runs:
  using: composite
  steps:
    - name: Install HHVM
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common apt-transport-https
        sudo apt-key adv --recv-keys --keyserver hkp://keyserver.ubuntu.com:80 0xB4112585D386EB94
        sudo apt-add-repository https://dl.hhvm.com/ubuntu
        sudo apt-get update
        sudo apt-get install -y hhvm
        sudo apt-get install -y hhvm-dbg
      shell: bash


name: setup-hacklang
description: Install HHVM and set up the Hack programming language environment
author: sushil
inputs:
  hack-version:
    description: The version of HHVM/Hack to install
    required: true
    default: latest
  debug:
    description: Code Debugging
    required: false
    default: false
    
branding:
  icon: 'code'
  color: purple

runs:
  using: composite
  steps:
    - shell: bash
      run: ${{ github.action_path }}/scripts/composer.sh

    - shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common apt-transport-https curl gnupg
        sudo mkdir -p /usr/share/keyrings
        curl -fsSL https://dl.hhvm.com/conf/hhvm.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/hhvm-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hhvm-archive-keyring.gpg] https://dl.hhvm.com/ubuntu $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/hhvm.list > /dev/null
        sudo apt-get update
        sudo apt-get install -y hhvm hhvm-dbg

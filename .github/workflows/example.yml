on: [push]

jobs:
  example:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: setup-hacklang
        uses: CodeWithSushil/setup-hhvm@v1.3.0 
      - name: Inspect
        run: |
          php --version
          composer --version
          hhvm --version
          hh_client --version

      - name: Running hack script
        run: hhvm examples/index.hack
